<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writings — Akshat</title>
  <style>
    :root {
      --bg: #fff;
      --fg: #000;
      --muted: #999;
      --dim: #aaa;
      --faint: #ddd;
      --border: #e8e8e8;
    }

    [data-theme="dark"] {
      --bg: #111;
      --fg: #e8e8e8;
      --muted: #666;
      --dim: #555;
      --faint: #333;
      --border: #222;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      font-size: 16px;
      line-height: 1.8;
      background: var(--bg);
      color: var(--fg);
      padding: 56px 48px;
      transition: background 0.2s, color 0.2s;
    }

    main {
      max-width: 640px;
      margin: 0 auto;
    }

    /* ── Site header ── */
    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 64px;
    }

    h1 {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: -0.5px;
      text-transform: uppercase;
      margin-bottom: 0;
    }

    h1 a {
      color: var(--fg);
      text-decoration: none;
    }

    h1 a:hover {
      text-decoration: underline;
    }

    /* ── Top nav ── */
    .site-nav a {
      color: var(--dim);
      text-decoration: none;
      font-size: 14px;
      margin-left: 28px;
      transition: color 0.1s;
    }

    .site-nav a:hover {
      color: var(--fg);
    }

    .site-nav a.active {
      color: var(--fg);
      border-bottom: 1px solid var(--fg);
    }

    #theme-toggle {
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 16px;
      color: var(--dim);
      margin-left: 28px;
      padding: 0;
      line-height: 1;
      transition: color 0.1s;
    }

    #theme-toggle:hover {
      color: var(--fg);
    }

    /* ── Post list ── */
    .post-list {
      list-style: none;
    }

    .post-item {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
      border-top: 1px solid var(--border);
    }

    .post-item:last-child {
      border-bottom: 1px solid var(--border);
    }

    .post-link {
      text-decoration: none;
      color: var(--fg);
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .post-link:hover .post-title {
      text-decoration: underline;
    }

    .post-title {
      font-size: 15px;
      font-weight: bold;
    }

    .post-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .post-date {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
      align-self: flex-start;
    }

    /* ── Empty state ── */
    .empty {
      padding-top: 8px;
      color: var(--muted);
      font-size: 15px;
    }

    /* ── Footer ── */
    footer {
      margin-top: 80px;
      font-size: 13px;
      color: var(--muted);
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      body {
        padding: 40px 24px;
      }

      h1 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
  <main>

    <header class="site-header">
      <h1><a href="index.html">Writings</a></h1>
      <nav class="site-nav">
        <a href="index.html">home</a>
        <a href="work.html">work</a>
        <a href="writings.html" class="active">writings</a>
        <button id="theme-toggle" aria-label="Toggle dark mode">○</button>
      </nav>
    </header>

    <ul class="post-list">
      <li class="post-item">
        <a class="post-link" href="https://x.com/pieakshat/status/2042677069407228216?s=20" target="_blank" rel="noopener noreferrer">
          <span class="post-title">Long Morpho Short Aave</span>
          <span class="post-desc">A pair trade analysis between $Aave and $Morpho</span>
        </a>
        <span class="post-date">Apr 2026</span>
      </li>
    </ul>

    <footer>© 2026</footer>

  </main>

  <script>
    const toggle = document.getElementById('theme-toggle');
    const root = document.documentElement;

    const saved = localStorage.getItem('theme');
    if (saved === 'light') {
      root.removeAttribute('data-theme');
      toggle.textContent = '○';
    } else {
      root.setAttribute('data-theme', 'dark');
      toggle.textContent = '●';
    }

    toggle.addEventListener('click', () => {
      const isDark = root.getAttribute('data-theme') === 'dark';
      if (isDark) {
        root.removeAttribute('data-theme');
        toggle.textContent = '○';
        localStorage.setItem('theme', 'light');
      } else {
        root.setAttribute('data-theme', 'dark');
        toggle.textContent = '●';
        localStorage.setItem('theme', 'dark');
      }
    });
  </script>
</body>

</html>
