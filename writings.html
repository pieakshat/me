<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writings — Akshat</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.8;
      background: #fff;
      color: #000;
      padding: 80px 48px;
    }

    main {
      max-width: 640px;
      margin: 0 auto;
    }

    /* ── Site header ── */
    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 64px;
    }

    h1 {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: -0.5px;
      text-transform: uppercase;
      margin-bottom: 0;
    }

    h1 a {
      color: #000;
      text-decoration: none;
    }

    h1 a:hover {
      text-decoration: underline;
    }

    /* ── Top nav ── */
    .site-nav a {
      color: #aaa;
      text-decoration: none;
      font-size: 13px;
      margin-left: 28px;
      transition: color 0.1s;
    }

    .site-nav a:hover {
      color: #000;
    }

    .site-nav a.active {
      color: #000;
      border-bottom: 1px solid #000;
    }

    /* ── Post list ── */
    .post-list {
      list-style: none;
    }

    .post-item {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
      border-top: 1px solid #eee;
    }

    .post-item:last-child {
      border-bottom: 1px solid #eee;
    }

    .post-title {
      font-size: 13px;
      color: #000;
      text-decoration: none;
      flex: 1;
    }

    .post-title:hover {
      text-decoration: underline;
    }

    .post-date {
      font-size: 12px;
      color: #bbb;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Empty state ── */
    .empty {
      padding-top: 8px;
      color: #bbb;
      font-size: 13px;
    }

    /* ── Footer ── */
    footer {
      margin-top: 80px;
      font-size: 13px;
      color: #999;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      body {
        padding: 40px 24px;
      }

      h1 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
  <main>

    <header class="site-header">
      <h1><a href="index.html">Writings</a></h1>
      <nav class="site-nav">
        <a href="index.html">home</a>
        <a href="work.html">work</a>
        <a href="writings.html" class="active">writings</a>
      </nav>
    </header>

    <ul class="post-list">
      <!-- add posts here as you write them:
      <li class="post-item">
        <a class="post-title" href="#">Post title</a>
        <span class="post-date">Feb 2026</span>
      </li>
      -->
    </ul>

    <p class="empty">nothing here yet. check back soon.</p>

    <footer>© 2026</footer>

  </main>
</body>

</html>
